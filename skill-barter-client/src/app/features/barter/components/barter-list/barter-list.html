@if (length$ | async) {
  <mat-card fxFlex fxLayout="column" fxLayoutAlign="space-between">
    <mat-list fxLayout="column" fxLayoutGap="3%">
      @for (barter of barters$ | async; track barter.id) {
        <mat-list-item>
          <!--  [ngClass]="statusClasses[barter.status]"> -->
          <app-barter-item [barter]="barter"></app-barter-item>
        </mat-list-item>
      }
    </mat-list>

    <mat-paginator
      [length]="length$ | async"
      [pageSize]="(paginationParams$ | async)!.pageSize"
      [pageIndex]="(paginationParams$ | async)!.page"
      (page)="getData($event)"
    >
    </mat-paginator>
  </mat-card>
} @else if (loading$ | async) {
  <app-loader [overlay]="false"></app-loader>
} @else {
  <app-empty-state
    title="No barters yet."
    message="There are no barters available."
  ></app-empty-state>
}
